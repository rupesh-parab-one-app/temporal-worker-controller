name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  skaffold-build:
    name: Test Skaffold Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version-file: 'go.mod'
        check-latest: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Install Skaffold
      run: |
        curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
        sudo install skaffold /usr/local/bin/
        skaffold config set --global collect-metrics false

    - name: Build worker-controller image
      run: |
        skaffold build --profile worker-controller --push=false
      env:
        DOCKER_BUILDKIT: 1
        BUILDKIT_PROGRESS: plain

    - name: Build helloworld worker image
      run: |
        skaffold build --profile helloworld-worker --push=false
      env:
        DOCKER_BUILDKIT: 1
        BUILDKIT_PROGRESS: plain

    # Verify that the demo worker patch applies successfully and builds.
    - name: Build helloworld worker image patch
      run: |
        git apply internal/demo/helloworld/changes/no-version-gate.patch
        skaffold build --profile helloworld-worker --push=false
      env:
        DOCKER_BUILDKIT: 1
        BUILDKIT_PROGRESS: plain

  test-integration:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: setup go workspace
      run: go work init && go work use -r .

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.work
        cache-dependency-path: |
          go.work.sum
          **/go.sum
        check-latest: true
        cache: true
        
    - name: Install Temporal CLI
      run: |
        curl -sSf https://temporal.download/cli.sh | sh
        echo "$HOME/.temporalio/bin" >> "$GITHUB_PATH"
        
    - name: Install kubectl
      uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v3.2
      with:
        version: 'latest'
        
    - name: Install Helm
      uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5
      with:
        version: 'v3.14.3'
        
    - name: Install controller-gen
      run: |
        go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.19.0
        
    - name: Install envtest
      run: |
        go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
        
    - name: Download dependencies
      run: go mod download
      
    - name: Run integration tests
      run: make test-integration
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: test-results
        path: |
          cover.out
          bin/
        retention-days: 7

  unit-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: setup go workspace
      run: go work init && go work use -r .
      
    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.work
        cache-dependency-path: |
          go.work.sum
          **/go.sum
        check-latest: true
        cache: true
        
    - name: Download dependencies
      run: go mod download

    - name: Install Helm
      uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5

    - name: Build Helm chart dependencies
      run: helm repo add jetstack https://charts.jetstack.io && helm dependency build helm/temporal-worker-controller

    - name: Run unit tests
      run: make test-unit
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: unit-test-results
        path: |
          cover.out
          bin/
        retention-days: 7 
